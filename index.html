<!DOCTYPE html>
<html>
<head>
    <title>Animal Hangman</title>
    <!-- Kept your original stylesheet link -->
    <link rel="stylesheet" href="samplestyle.css" />
    <style>
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
        }

        .modal-content {
            background-color: #333; 
            color: white;
            width: 300px;
            margin: 20vh auto;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 2px solid #555;
            font-family: Arial, sans-serif;
        }

        .modal-content input {
            width: 40px;
            padding: 5px;
            font-size: 1.2rem;
            text-align: center;
            margin: 10px 0;
        }

        .modal-btn {
            padding: 8px 15px;
            cursor: pointer;
            background: #555;
            color: white;
            border: 1px solid #777;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    
    <br> <br> <br> <br> <br> <br> <br><br><br><br><br><br>
    
    
    <p><button class="btn" onclick="animalHangman()">Start Animal Hangman</button></p>

    <!-- The New Custom Dialogue Box -->
    <div id="hangmanModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modalTitle">Animal Hangman</h3>
            <p id="displayWord" style="font-size: 1.5rem; letter-spacing: 3px;"></p>
            <p>Guess a letter:</p>
            <input type="text" id="guessInput" maxlength="1" autofocus>
            <br><br>
            <button class="modal-btn" onclick="processGuess()">Submit</button>
            <button class="modal-btn" onclick="closeGame()">Cancel</button>
        </div>
    </div>

    <script>
        var animals = ["lion", "tiger", "elephant", "giraffe", "zebra", "bear", "wolf", "fox", "deer", "monkey", "gorilla", "chimpanzee", "kangaroo", "koala", "panda", "rhinoceros (rhino)", "hippopotamus (hippo)", "camel", "horse", "cow", "sheep", "goat", "pig", "dog", "cat", "rabbit", "squirrel", "raccoon", "beaver", "porcupine", "moose", "wolf", "coyote", "hyena", "cheetah", "leopard", "jaguar", "pangolin", "okapi", "sloth", "armadillo", "hedgehog", "meerkat", "opossum", "skunk", "weasel", "badger", "wombat", "yak", "alpaca", "eagle", "owl", "parrot", "penguin", "flamingo", "peacock", "crow", "sparrow", "pigeon", "duck", "hen", "turkey", "swan", "hawk", "vulture", "crocodile", "alligator", "lizard", "snake", "turtle", "tortoise", "frog", "toad", "chameleon", "iguana", "komodo dragon", "shark", "dolphin", "whale", "octopus", "jellyfish", "squid", "seahorse", "seal", "walrus", "eel", "barracuda", "crab", "ant", "bee", "butterfly", "spider", "snail", "firefly", "beetle", "worm", "mosquito", "grasshopper", "ladybug", "cockroach"];

        var chosenanimal, answerArray, remletters;

        function animalHangman() {
            chosenanimal = animals[Math.floor(Math.random() * animals.length)];
            answerArray = [];
            remletters = 0;

            for (var i = 0; i < chosenanimal.length; i++) {
                // Handling spaces and special characters in your list
                if (chosenanimal[i] === " " || chosenanimal[i] === "(" || chosenanimal[i] === ")" || chosenanimal[i] === "-") {
                    answerArray[i] = chosenanimal[i];
                } else {
                    answerArray[i] = "_";
                    remletters++;
                }
            }

            document.getElementById("hangmanModal").style.display = "block";
            refreshUI();
        }

        function refreshUI() {
            document.getElementById("displayWord").innerText = answerArray.join(" ");
            document.getElementById("guessInput").value = "";
            document.getElementById("guessInput").focus();
        }

        function processGuess() {
            var input = document.getElementById("guessInput");
            var guess = input.value.toLowerCase();

            if (guess.length !== 1) {
                alert("Please enter a single letter.");
                return;
            }

            var correct = false;
            for (var j = 0; j < chosenanimal.length; j++) {
                if (chosenanimal[j] === guess && answerArray[j] === "_") {
                    answerArray[j] = guess;
                    remletters--;
                    correct = true;
                }
            }

            refreshUI();

            if (remletters === 0) {
                setTimeout(function() {
                    alert("Good job! The answer was " + chosenanimal);
                    closeGame();
                }, 100);
            }
        }

        function closeGame() {
            document.getElementById("hangmanModal").style.display = "none";
        }

        // Listen for the 'Enter' key inside the input box
        document.getElementById("guessInput").addEventListener("keypress", function(e) {
            if (e.key === 'Enter') processGuess();
        });
    </script>
</body>
</html>
